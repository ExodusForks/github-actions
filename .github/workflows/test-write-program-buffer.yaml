name: Test write-program-buffer

on:
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    name: Integration (solana ${{ matrix.solana-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        solana-version: ["3.1.14", "4.1.2"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: ./setup-all
        with:
          solana_version: ${{ matrix.solana-version }}

      - name: Start local validator
        id: validator
        uses: ./start-test-validator

      - name: Prepare fresh-program scenario
        id: prepare-fresh
        shell: bash
        run: ./write-program-buffer/tests/integration/prepare-fresh.sh

      - name: Run action for fresh program
        id: run-fresh
        uses: ./write-program-buffer
        with:
          program-id: ${{ steps.prepare-fresh.outputs.program-id }}
          program: fixture-fresh
          rpc-url: http://127.0.0.1:8899
          keypair: ${{ steps.prepare-fresh.outputs.keypair }}
          buffer-authority-address: ${{ steps.prepare-fresh.outputs.deployer }}

      - name: Assert fresh-program scenario
        shell: bash
        env:
          BUFFER: ${{ steps.run-fresh.outputs.buffer }}
          PROGRAM_ID: ${{ steps.prepare-fresh.outputs.program-id }}
          DEPLOYER: ${{ steps.prepare-fresh.outputs.deployer }}
        run: ./write-program-buffer/tests/integration/assert-fresh.sh

      - name: Dump validator log on failure
        if: failure()
        shell: bash
        run: tail -100 "${{ steps.validator.outputs.ledger-dir }}/validator.log" || true
